name: Class Reminders

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder endpoint
        run: |
          body=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/class-reminders" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          status=$(echo "$body" | tail -n1)
          response=$(echo "$body" | head -n -1)

          echo "Status:   $status"
          echo "Response: $response"

          if [ "$status" != "200" ]; then
            echo "Endpoint returned $status — fallo"
            exit 1
          fi
