name: Class Reminders

on:
  schedule:
    # Corre cada hora en punto (UTC)
    - cron: "0 * * * *"
  workflow_dispatch: # permite dispararlo manualmente desde GitHub para probar

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/class-reminders" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response status: $response"
          if [ "$response" != "200" ]; then
            echo "Endpoint returned $response — fallo"
            exit 1
          fi
